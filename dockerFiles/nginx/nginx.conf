server {
    listen 80;
    server_name localhost;
    
    # Laravel loyihasining asosiy kirish nuqtasi
    root /app/public;
    index index.php index.html;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Statik fayllar uchun loglarni o'chirib qo'yamiz (keraksiz yuklama bo'lmasligi uchun)
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # PHP-FPM konteyneriga so'rovlarni uzatish
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # .htaccess yoki yashirin fayllarga ruxsat bermaslik
    location ~ /\.ht {
        deny all;
    }
}